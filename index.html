<script>
function update_page(offset) {
    const all_chores = {"downstairs-bedroom": [["ensuite"], ["Millie", "Ashton"]], "main": [["bins", "kitchen", "mop", "toilet-lounge", "vacuum"], ["Ashton", "Dan", "Harry", "Sophie", "Millie"]], "upstairs": [["upstairs-bathroom"], ["Dan", "Harry", "Sophie"]]};
    for (const group in all_chores) {
        const chores = all_chores[group][0];
        const people = all_chores[group][1];
        const assignments = assign_chores(offset, chores, people);
        for (const chore in assignments) {
            document
                .getElementById(`chore-${group}-${chore}-person`)
                .innerText = assignments[chore];
        }
    }

    document.getElementById("week-end").innerText = end_of_week(offset).toDateString();
}

document.getElementById("date")
    .addEventListener("change", function(event) {
        const date = new Date(event.target.value);
        update_page(date_to_offset(date));
    });
</script>
