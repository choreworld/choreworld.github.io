<!DOCTYPE html>
<html>
<head>

    
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>choreworld, Wellington</title>
    <link rel="stylesheet" type="text/css" href="/static/styles.css">
    <link rel="icon" type="image/png" href="/assets/favicon.png">
    <link rel="apple-touch-icon" href="/assets/dishes-square.png">

    <link rel="stylesheet" type="text/css" href="/static/welly.css">

</head>
<body>



<main>

<h1>Welcome to choreworld (Wellington edition)</h1>


<form class="datepicker">
    <label for="date" class="datepicker-label">Select date</label>
    <input id="date" name="date" type="date" class="datepicker-date">
</form>


<h2>Chores for week ending <span id="week-end">Sunday, 15 December 2024</span></h2>



<dl id="chores-main" class="chores">

    
        
<div class="chore">
    <dt>Bathroom</dt>
    <dd id="chore-main-bathroom-person">Fig</dd>
</div>

    
        
<div class="chore">
    <dt>Floors</dt>
    <dd id="chore-main-floors-person">Sebastian</dd>
</div>

    
        
<div class="chore">
    <dt>Misc</dt>
    <dd id="chore-main-misc-person">Nick</dd>
</div>

    
    
<div class="chore">
    <dt>Kitchen</dt>
    <dd id="chore-main-kitchen-person">Alice</dd>
</div>


</dl>

</main>




<footer class="info-footer">
<p>
    <a href="https://github.com/choreworld/choreworld.github.io/issues">Feedback</a>
    | <a href="/license">License</a>
</p>
<p>choreworld v0.3 &copy; choreworld 2023</p>
</footer>




<script src="/static/chores.js"></script>
<script>
function updatePage(offset) {
    const allChores = {"main": [["bathroom", "floors", "misc"], ["Fig", "Sebastian", "Nick"]]};
    for (const group in allChores) {
        const [chores, people] = allChores[group];
        const assignments = assignChores(offset, chores, people);
        for (const chore in assignments) {
            const personElem = document.getElementById(`chore-${group}-${chore}-person`);
            if (personElem !== null) {
                personElem.innerText = assignments[chore];
            }
        }
    }

    document.getElementById("week-end").innerText = endOfWeek(offset).toDateString();
}

document.getElementById("date")
    ?.addEventListener("change", function(event) {
        const date = new Date(event.target.value);
        updatePage(dateToOffset(date));
    });
</script>



</body>
</html>
